<!DOCTYPE html>
<html lang="{{ site.lang | default: " en-US" }}" data-theme="dark">

<head>
    <script>
        (function () {
            var saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <meta charset="UTF-8">
    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    {% if page.keywords %}
    <meta name="keywords" content="{{ page.keywords }}" />
    {% endif %}
    <link rel="alternate" type="application/rss+xml" title="Subscribe to What's New"
        href="https://odan.github.io/feed.xml" />
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800|jetbrains-mono:400,500" rel="stylesheet" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?">
 
</head>

<body>
    <nav>
        <div class="nav-inner">
            <a href="{{ '/' | relative_url }}" class="nav-logo">odan/blog</a>
            <div class="nav-links" id="nav-links">
                <a href="{{ '/' | relative_url }}">Blog</a>
                <a href="{{ '/about.html' | relative_url }}">About</a>
                <a href="{{ '/donate.html' | relative_url }}">Donate</a>
                <a href="{{ '/search.html' | relative_url }}">Search</a>
            </div>
            <button class="theme-btn" id="toggle-mode" aria-label="Toggle dark/light mode">&#9790;</button>
            <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
        </div>
        <div class="nav-overlay" id="nav-overlay"></div>
    </nav>

    <header class="hero" role="banner">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1>{{ site.title | default: site.github.repository_name }}</h1>
            <p>{{ site.description | default: site.github.project_tagline }}</p>
        </div>
    </header>

    <main id="content" class="container-wide" role="main">
        {{ content }}

        <footer>
            &copy; {{ site.time | date: "%Y" }} Daniel Opitz
            &nbsp;|&nbsp; <a href="https://x.com/dopitz" target="_blank">X</a>
            &nbsp;|&nbsp; <a href="https://github.com/odan" target="_blank">GitHub</a>
            &nbsp;|&nbsp; <a href="https://www.linkedin.com/in/daniel-opitz-493816111" target="_blank">LinkedIn</a>
            &nbsp;|&nbsp; <a href="https://odan.github.io/feed.xml" target="_blank">RSS</a>
        </footer>
    </main>

    <script>
        (function () {
            document.getElementById('toggle-mode').addEventListener('click', function (e) {
                var cur = document.documentElement.getAttribute('data-theme');
                var next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });

            var hamburger = document.getElementById('hamburger');
            var navLinks = document.getElementById('nav-links');
            var overlay = document.getElementById('nav-overlay');
            if (hamburger && navLinks) {
                function closeMenu() {
                    navLinks.classList.remove('open');
                    overlay.classList.remove('open');
                    document.body.classList.remove('nav-open');
                }
                hamburger.addEventListener('click', function () {
                    navLinks.classList.toggle('open');
                    overlay.classList.toggle('open');
                    document.body.classList.toggle('nav-open');
                });
                overlay.addEventListener('click', closeMenu);
                navLinks.querySelectorAll('a').forEach(function (link) {
                    link.addEventListener('click', closeMenu);
                });
            }
        })();
    </script>
</body>

</html>
