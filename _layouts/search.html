---
layout: default
---

<h1 class="page-heading">Search</h1>

<form class="search-form" action="">
    <label for="search">Search term:</label>
    <input id="search" type="text" name="search" placeholder="" autocomplete="off" tabindex="0">
    <ul class="search-results" id="list"></ul>
</form>

{% include adsense.html %}

<script src="{{ '/assets/fetch.js' | relative_url }}"></script>
<script src="{{ '/assets/search.js' | relative_url }}"></script>
<script>
    var search = new jekyllSearch(
        '{{ "/assets/search.json" | relative_url }}',
        '#search',
        '#list',
        '{{ site.url }}'
    );
    search.init();

    window.setTimeout(function () {
        document.getElementById('search').focus();
    }, 100);
</script>

<noscript>Please enable JavaScript to use the search form.</noscript>
