<script src="https://utteranc.es/client.js"

<script>
    (function() {
        var theme = document.documentElement.getAttribute('data-theme');

            var s = document.getElementById('utterances-script');
            s.setAttribute('theme', 'github-dark');
        }
    })();
</script>
